services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: homecatcher
      POSTGRES_PASSWORD: homecatcher
      POSTGRES_DB: homecatcher
    ports:
      - "5432:5432"
    volumes:
      - homecatcher_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  homecatcher_pg:
